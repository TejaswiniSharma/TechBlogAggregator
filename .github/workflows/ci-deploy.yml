# CI/CD Pipeline — Test & Deploy
#
# Trigger: push to main
# Stage 1: Run pytest on GitHub-hosted runner
# Stage 2: SSH into EC2 and deploy (only if tests pass)
#
# Required GitHub Secrets:
#   EC2_HOST        — public IP or domain of your EC2 instance
#   EC2_USER        — SSH user (e.g., ubuntu)
#   EC2_SSH_KEY     — private SSH key (contents of .pem file)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Tech-blog-system
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart techblog
            echo "Deployed at $(date)"
